version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: lifemanager_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpassword
      POSTGRES_DB: lifemanager
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  bot:
    build: .
    container_name: lifemanager_bot
    restart: unless-stopped
    depends_on:
      - db
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://botuser:botpassword@db:5432/lifemanager

volumes:
  pgdata:
